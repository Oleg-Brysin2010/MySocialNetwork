<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продвинутая Соцсеть</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #07080d;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 12px;
            overflow-x: hidden;
            position: relative;
        }

        /* Задний неоновый фон */
        .bg-glow-1, .bg-glow-2 {
            position: fixed;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.35;
        }
        .bg-glow-1 { background: #6366f1; top: -100px; left: -100px; }
        .bg-glow-2 { background: #d946ef; bottom: -100px; right: -100px; }

        .app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Стекломорфизм */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            padding: 22px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        header h1 {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { color: #9ca3af; font-size: 13px; margin-top: 4px; }

        /* Блок профиля */
        .profile-section h3 { font-size: 15px; margin-bottom: 8px; color: #a5b4fc; }
        
        .glass-input, .glass-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        .glass-input:focus, .glass-textarea:focus {
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }
        .glass-textarea { resize: none; min-height: 100px; margin-top: 10px; }

        /* Стильная кнопка с анимацией загрузки */
        .publish-btn {
            margin-top: 12px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }
        .publish-btn:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }
        .publish-btn:disabled { background: #374151; color: #9ca3af; cursor: not-allowed; }

        /* Крутилка загрузки (Спиннер) */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Стили постов и хештегов */
        .feed-title { font-size: 18px; font-weight: 700; color: #e5e7eb; margin-top: 5px; }
        .post-card { display: flex; flex-direction: column; gap: 8px; transition: transform 0.3s; }
        
        .post-header { display: flex; justify-content: space-between; font-size: 13px; color: #a5b4fc; font-weight: 600; }
        .post-header .post-time { color: #6b7280; font-weight: 400; }
        
        .post-card h3 { font-size: 18px; color: #fff; font-weight: 700; margin-top: 4px; }
        
        .post-text-container {
            font-size: 15px;
            color: #d1d5db;
            line-height: 1.5;
            white-space: pre-wrap;
            position: relative;
        }
        
        /* Свернутый текст */
        .text-collapsed {
            max-height: 75px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: #f472b6;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 0;
            text-align: left;
        }

        /* Стиль для хештегов внутри текста */
        .hashtag {
            color: #38bdf8;
            font-weight: 600;
            background: rgba(56, 189, 248, 0.1);
            padding: 1px 5px;
            border-radius: 6px;
            display: inline-block;
        }

        /* Подвал поста: лайки */
        .post-footer {
            display: flex;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
            margin-top: 6px;
        }

        .like-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 20px;
            color: #f3f4f6;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .like-btn:hover { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: #f87171; }
        .like-btn.liked { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #f87171; }
    </style>
</head>
<body>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="app-container">
        
        <header class="glass-panel">
            <h1>Моя Соцсеть</h1>
            <p>Версия 2.0 • С лайками, профилями и хештегами</p>
        </header>

        <section class="glass-panel profile-section">
            <h3>👤 Ваш профиль в соцсети</h3>
            <input type="text" id="user-nickname" class="glass-input" placeholder="Придумайте ваш никнейм...">
        </section>

        <section class="glass-panel">
            <input type="text" id="post-title" class="glass-input" placeholder="Заголовок истории...">
            <textarea id="post-text" class="glass-textarea" placeholder="Расскажите историю... Используйте #хештеги!"></textarea>
            <button id="publish-btn" class="publish-btn">
                <div id="btn-spinner" class="spinner"></div>
                <span id="btn-text">Опубликовать историю</span>
            </button>
        </section>

        <main>
            <h2 class="feed-title">Актуальные истории</h2>
            <br>
            <div id="feed" style="display: flex; flex-direction: column; gap: 16px;">
                <div style="text-align: center; color: #9ca3af;">Загрузка ленты...</div>
            </div>
        </main>
        
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, doc, updateDoc, increment } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTtvMsNXAi6HJZD5igZmzAKeX1eU8rG9I",
            authDomain: "mysocialnetwork-131ec.firebaseapp.com",
            databaseURL: "https://mysocialnetwork-131ec-default-rtdb.firebaseio.com",
            projectId: "mysocialnetwork-131ec",
            storageBucket: "mysocialnetwork-131ec.firebasestorage.app",
            messagingSenderId: "275366142131",
            appId: "1:275366142131:web:d97858c8dee6242746d0c6",
            measurementId: "G-TGEM7NNKVL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Элементы
        const nicknameInput = document.getElementById("user-nickname");
        const titleInput = document.getElementById("post-title");
        const textInput = document.getElementById("post-text");
        const publishBtn = document.getElementById("publish-btn");
        const btnSpinner = document.getElementById("btn-spinner");
        const btnText = document.getElementById("btn-text");
        const feed = document.getElementById("feed");

        // Загрузка сохраненного никнейма
        if(localStorage.getItem("soc_nickname")) {
            nicknameInput.value = localStorage.getItem("soc_nickname");
        }

        // ПУБЛИКАЦИЯ С АНИМАЦИЕЙ ЗАГРУЗКИ
        publishBtn.addEventListener("click", async function() {
            const nickname = nicknameInput.value.trim() || "Аноним";
            const title = titleInput.value.trim();
            const text = textInput.value.trim();

            if (!title || !text) {
                alert("Заполните заголовок и текст истории!");
                return;
            }

            // Сохраняем ник в память телефона
            localStorage.setItem("soc_nickname", nickname);

            try {
                // Включаем мини-загрузку
                publishBtn.disabled = true;
                btnSpinner.style.display = "block";
                btnText.innerText = "Отправка...";

                await addDoc(collection(db, "posts"), {
                    author: nickname,
                    title: title,
                    text: text,
                    likes: 0,
                    timestamp: serverTimestamp()
                });

                titleInput.value = "";
                textInput.value = "";
            } catch (error) {
                alert("Ошибка публикации!");
                console.error(error);
            } finally {
                // Выключаем загрузку
                publishBtn.disabled = false;
                btnSpinner.style.display = "none";
                btnText.innerText = "Опубликовать историю";
            }
        });

        // ЗАГРУЗКА ЛЕНТЫ В РЕАЛЬНОМ ВРЕМЕНИ
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (querySnapshot) => {
            feed.innerHTML = "";
            
            if (querySnapshot.empty) {
                feed.innerHTML = `<div class="glass-panel" style="text-align:center; color:#9ca3af;">Лента пуста. Напишите первую историю!</div>`;
                return;
            }

            querySnapshot.forEach((documentSnapshot) => {
                const post = documentSnapshot.data();
                const postId = documentSnapshot.id;
                
                const postCard = document.createElement("div");
                postCard.className = "glass-panel post-card";
                
                const timeString = post.timestamp 
                    ? new Date(post.timestamp.toDate()).toLocaleString("ru-RU", {hour: "2-digit", minute: "2-digit", day: "numeric", month: "short"}) 
                    : "Только что";

                // Обработка текста: XSS защита + подсветка Хештегов
                let safeText = escapeHtml(post.text);
                safeText = safeText.replace(/#([a-zA-Zа-яА-Я0-9_]+)/g, '<span class="hashtag">#$1</span>');

                // Проверяем длину текста для кнопки "Читать полностью"
                const isLongText = post.text.length > 160;

                postCard.innerHTML = `
                    <div class="post-header">
                        <span>👤 @${escapeHtml(post.author || "Аноним")}</span>
                        <span class="post-time">${timeString}</span>
                    </div>
                    <h3>${escapeHtml(post.title)}</h3>
                    <div class="post-text-container ${isLongText ? 'text-collapsed' : ''}" id="text-${postId}">
                        ${safeText}
                    </div>
                    ${isLongText ? `<button class="read-more-btn" id="btn-more-${postId}">Читать полностью ↓</button>` : ''}
                    <div class="post-footer">
                        <button class="like-btn" id="like-${postId}">
                            ❤️ <span>${post.likes || 0}</span>
                        </button>
                    </div>
                `;
                
                feed.appendChild(postCard);

                // Логика кнопки "Читать полностью"
                if (isLongText) {
                    const moreBtn = document.getElementById(`btn-more-${postId}`);
                    const textCont = document.getElementById(`text-${postId}`);
                    moreBtn.addEventListener("click", () => {
                        textCont.classList.toggle("text-collapsed");
                        moreBtn.innerText = textCont.classList.contains("text-collapsed") ? "Читать полностью ↓" : "Свернуть ↑";
                    });
                }

                // ЛОГИКА ЛАЙКОВ (Прямо в Firebase)
                const likeBtn = document.getElementById(`like-${postId}`);
                likeBtn.addEventListener("click", async () => {
                    // Чтобы нельзя было спамить лайками на одном устройстве, помечаем кнопку
                    if (likeBtn.classList.contains("liked")) return; 
                    
                    likeBtn.classList.add("liked");
                    const postRef = doc(db, "posts", postId);
                    await updateDoc(postRef, {
                        likes: increment(1)
                    });
                });
            });
        });

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }
    </script>
</body>
</html>
